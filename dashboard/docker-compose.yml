# ─── Réseau : network_mode: host sur les deux services ───────────────────────
# Compatible avec Docker iptables:false + UFW NAT.
# metrics-api écoute sur 127.0.0.1:5055 (jamais exposé directement).
# Caddy écoute sur 0.0.0.0:80/443 (UFW autorise déjà ces ports).

services:

  metrics-api:
    build: ./api
    container_name: vps-monitor-api
    network_mode: host
    volumes:
      - /var/lib/apt/periodic:/var/lib/apt/periodic:ro
      - /var/log:/var/log:ro
      - /var/log/vps-monitor-history.json:/var/log/vps-monitor-history.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/crowdsec/local_api_credentials.yaml:/etc/crowdsec/local_api_credentials.yaml:ro
      - /etc/vps-secure:/etc/vps-secure:ro
      - /etc/cron.d/vps-secure:/etc/cron.d/vps-secure
      - /etc/pam.d/sshd:/etc/pam.d/sshd
    environment:
      API_HOST:           "127.0.0.1"
      API_PORT:           "5055"
      CACHE_TTL:          "30"
      CROWDSEC_URL:       "http://127.0.0.1:8081"
      CROWDSEC_API_KEY:   "${CROWDSEC_API_KEY:-}"
      ENDLESSH_CONTAINER: "${ENDLESSH_CONTAINER:-endlessh}"
      CROWDSEC_CONTAINER: "${CROWDSEC_CONTAINER:-crowdsec}"
      HOSTFS:             "/"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: vps-monitor-caddy
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - metrics-api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
