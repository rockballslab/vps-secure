<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS Secure — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #f0ebe3;
      --card:  #ffffff;
      --teal:  #2d7d6f;
      --teal-l:#3a9e8e;
      --rose:  #e05a7a;
      --gold:  #c9a84c;
      --text:  #1e1e1e;
      --muted: #9a9085;
      --so: -8px 8px 0px rgba(0,0,0,0.07),
            -12px 16px 28px rgba(0,0,0,0.20),
            -20px 24px 52px rgba(0,0,0,0.09),
            6px -6px 16px rgba(255,255,255,0.96);
      --si: inset 4px 4px 10px rgba(0,0,0,0.11),
            inset -3px -3px 8px rgba(255,255,255,0.88);
      --st: -8px 10px 24px rgba(45,125,111,0.55),
            -14px 18px 40px rgba(45,125,111,0.20),
            4px -4px 10px rgba(255,255,255,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Décoration fond */
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45,125,111,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 360px; height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(224,90,122,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--teal-l), var(--teal));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: var(--st);
    }

    .logo-text .name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text .sub  { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px; }

    /* Card */
    .card {
      background: var(--card);
      border-radius: 30px;
      padding: 36px 32px;
      box-shadow: var(--so);
      position: relative;
      overflow: hidden;
    }

    /* Highlight haut-droite */
    .card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 55%; height: 45%;
      background: linear-gradient(225deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 65%);
      border-radius: 0 30px 0 60%;
      pointer-events: none;
    }

    /* Accent top */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 30px 30px 0 0;
      background: linear-gradient(90deg, var(--teal), var(--teal-l));
    }

    .card-title {
      font-size: 18px; font-weight: 800; letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 12.5px; color: var(--muted); font-weight: 500;
      margin-bottom: 28px;
    }

    /* Champs */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg);
      border: none;
      border-radius: 14px;
      font-size: 14px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      box-shadow: var(--si);
      outline: none;
      transition: box-shadow 0.18s ease;
    }

    .field input:focus {
      box-shadow: var(--si), 0 0 0 3px rgba(45,125,111,0.15);
    }

    .field input[type="password"] {
      font-family: 'DM Mono', monospace;
      letter-spacing: 2px;
    }

    /* Bouton */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 14px; font-weight: 800;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      box-shadow: var(--st);
      transition: all 0.18s ease;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .btn-login:hover  { transform: translateY(-2px); filter: brightness(1.08); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; pointer-events: none; }

    /* Erreur */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(224,90,122,0.1);
      border-radius: 12px;
      font-size: 12.5px; font-weight: 600;
      color: #b91c1c;
      text-align: center;
    }
    .error-box.visible { display: block; }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px; color: var(--muted); font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">
        <div class="name">VPS Secure</div>
        <div class="sub">Monitor</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Connexion</div>
      <div class="card-sub">Accès restreint — identifie-toi pour continuer</div>

      <div class="field">
        <label>Identifiant</label>
        <input type="text" id="username" value="admin" autocomplete="username" spellcheck="false">
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••••••">
      </div>

      <button class="btn-login" id="btn-login" onclick="login()">
        Accéder au dashboard
      </button>

      <div class="error-box" id="error-box">
        Identifiants incorrects — réessaie.
      </div>
    </div>

    <div class="footer">vps-secure · connexion chiffrée TLS</div>

  </div>

  <script>
  'use strict';

  // Déjà connecté ?
  if (sessionStorage.getItem('vps_auth')) {
    window.location.href = '/';
  }

  const $id = id => document.getElementById(id);

  // Enter → login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const user = $id('username').value.trim();
    const pass = $id('password').value;
    const btn  = $id('btn-login');
    const err  = $id('error-box');

    if (!user || !pass) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spin">↻</span> Vérification…';
    err.classList.remove('visible');

    const token = 'Basic ' + btoa(`${user}:${pass}`);

    try {
      const res = await fetch('/api/health', {
        cache: 'no-store',
        headers: { 'Authorization': token },
      });

      if (res.ok) {
        sessionStorage.setItem('vps_auth', token);
        window.location.href = '/';
      } else {
        err.classList.add('visible');
        $id('password').value = '';
        $id('password').focus();
      }
    } catch {
      err.textContent = 'Serveur inaccessible — vérifie ta connexion.';
      err.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Accéder au dashboard';
    }
  }
  </script>

</body>
</html>
