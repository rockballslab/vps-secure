<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPS Secure — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #0d0f0e;
      --card:  #161a18;
      --teal:  #00ff88;
      --teal-l:#33ffaa;
      --rose:  #ff4d6d;
      --text:  #f0f0f0;
      --muted: #6b7280;
      --border: rgba(255,255,255,0.06);
      --so: 0 2px 8px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px var(--border);
      --si: inset 0 1px 3px rgba(0,0,0,0.5), inset 0 -1px 2px rgba(255,255,255,0.03);
      --st: 0 4px 20px rgba(0,255,136,0.3), 0 0 0 1px rgba(0,255,136,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Grille décorative fond */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Halo vert haut-droite */
    body::after {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,255,136,0.05));
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: var(--st);
    }

    .logo-text .name {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo-text .sub  { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px; }

    /* Card */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: var(--so);
      position: relative;
      overflow: hidden;
    }

    /* Accent top vert acide */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 20px 20px 0 0;
      background: linear-gradient(90deg, var(--teal), var(--teal-l));
      box-shadow: 0 0 20px rgba(0,255,136,0.4);
    }

    /* Suppression reflet light mode */
    .card::after { display: none; }

    .card-title {
      font-size: 18px; font-weight: 800; letter-spacing: -0.4px;
      margin-bottom: 6px;
      color: var(--text);
    }
    .card-sub {
      font-size: 12.5px; color: var(--muted); font-weight: 500;
      margin-bottom: 28px;
    }

    /* Champs */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      box-shadow: var(--si);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .field input:focus {
      border-color: rgba(0,255,136,0.4);
      box-shadow: var(--si), 0 0 0 3px rgba(0,255,136,0.1);
    }

    .field input::placeholder { color: var(--muted); opacity: 0.6; }

    .field input[type="password"] {
      font-family: 'DM Mono', monospace;
      letter-spacing: 2px;
    }

    /* Bouton */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: #0d0f0e;
      border: none;
      border-radius: 12px;
      font-size: 14px; font-weight: 800;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      box-shadow: var(--st);
      transition: all 0.18s ease;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .btn-login:hover  { transform: translateY(-2px); filter: brightness(1.08); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; pointer-events: none; }

    /* Erreur */
    .error-box {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.2);
      border-radius: 10px;
      font-size: 12.5px; font-weight: 600;
      color: #ff4d6d;
      text-align: center;
    }
    .error-box.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px; color: var(--muted); font-weight: 500;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <div class="logo-text">
        <div class="name">VPS Secure</div>
        <div class="sub">Cockpit de Monitoring</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Connexion</div>
      <div class="card-sub">Accès restreint — identifie-toi pour continuer</div>

      <div class="field">
        <label>Identifiant</label>
        <input type="text" id="username" value="admin" autocomplete="username" spellcheck="false">
      </div>

      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••••••">
      </div>

      <button class="btn-login" id="btn-login" onclick="login()">
        Accéder au dashboard
      </button>

      <div class="error-box" id="error-box">
        Identifiants incorrects — réessaie.
      </div>
    </div>

    <div class="footer">vps-secure · connexion chiffrée TLS</div>

  </div>

  <script>
  'use strict';

  // Déjà connecté ?
  if (sessionStorage.getItem('vps_auth')) {
    window.location.href = '/';
  }

  const $id = id => document.getElementById(id);

  // Enter → login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const user = $id('username').value.trim();
    const pass = $id('password').value;
    const btn  = $id('btn-login');
    const err  = $id('error-box');

    if (!user || !pass) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spin">↻</span> Vérification…';
    err.classList.remove('visible');

    const token = 'Basic ' + btoa(`${user}:${pass}`);

    try {
      const res = await fetch('/api/health', {
        cache: 'no-store',
        headers: { 'Authorization': token },
      });

      if (res.ok) {
        sessionStorage.setItem('vps_auth', token);
        window.location.href = '/';
      } else {
        err.classList.add('visible');
        $id('password').value = '';
        $id('password').focus();
      }
    } catch {
      err.textContent = 'Serveur inaccessible — vérifie ta connexion.';
      err.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Accéder au dashboard';
    }
  }
  </script>

</body>
</html>
